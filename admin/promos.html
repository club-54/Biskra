<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أكواد البروموكود — Club 54 Food</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 32px 16px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    header h1 { font-size: 1.6rem; color: #F4C430; }
    header a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.85rem;
      border: 1px solid #333;
      padding: 6px 14px;
      border-radius: 6px;
    }
    header a:hover { border-color: #F4C430; color: #F4C430; }
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .stat {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 16px 24px;
      text-align: center;
      min-width: 120px;
    }
    .stat .num { font-size: 2rem; font-weight: 700; color: #F4C430; }
    .stat .label { font-size: 0.78rem; color: #888; margin-top: 4px; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
    }
    thead { background: #1a1a1a; }
    th {
      padding: 14px 18px;
      text-align: right;
      font-size: 0.8rem;
      color: #F4C430;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #222;
    }
    td {
      padding: 14px 18px;
      font-size: 0.9rem;
      border-bottom: 1px solid #1a1a1a;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #161616; }
    .code {
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      color: #fff;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .badge-discount {
      display: inline-block;
      background: rgba(244,196,48,0.12);
      color: #F4C430;
      border: 1px solid rgba(244,196,48,0.3);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .badge-available {
      display: inline-block;
      background: rgba(34,197,94,0.12);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.82rem;
    }
    .badge-used {
      display: inline-block;
      background: rgba(239,68,68,0.1);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.82rem;
    }
    .copy-btn {
      background: none;
      border: 1px solid #333;
      color: #aaa;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .copy-btn:hover { border-color: #F4C430; color: #F4C430; }
    .copy-btn.copied { border-color: #22c55e; color: #22c55e; }
    .used-at { color: #666; font-size: 0.8rem; }
    .loading { text-align: center; padding: 60px; color: #555; }
    .error { text-align: center; padding: 40px; color: #ef4444; }
  </style>
</head>
<body>
  <header>
    <h1>🎟️ أكواد البروموكود</h1>
    <a href="/admin">← لوحة الإدارة</a>
  </header>

  <div class="stats" id="stats">
    <div class="stat"><div class="num" id="totalCount">—</div><div class="label">إجمالي الأكواد</div></div>
    <div class="stat"><div class="num" id="availCount">—</div><div class="label">متاحة</div></div>
    <div class="stat"><div class="num" id="usedCount">—</div><div class="label">مستخدمة</div></div>
  </div>

  <div id="tableWrap" class="loading">جاري التحميل…</div>

  <script>
    async function load() {
      try {
        const res = await fetch('/api/promos');
        if (!res.ok) throw new Error('فشل التحميل');
        const codes = await res.json();

        const total = codes.length;
        const used  = codes.filter(c => c.used).length;
        const avail = total - used;

        document.getElementById('totalCount').textContent = total;
        document.getElementById('availCount').textContent  = avail;
        document.getElementById('usedCount').textContent  = used;

        const rows = codes.map((c, i) => `
          <tr>
            <td style="color:#555;font-size:0.8rem">${i + 1}</td>
            <td>
              <span class="code" id="code-${i}">${c.code}</span>
            </td>
            <td><span class="badge-discount">${c.discount}%</span></td>
            <td>${c.used
              ? `<span class="badge-used">مستخدم</span>`
              : `<span class="badge-available">متاح</span>`}
            </td>
            <td class="used-at">${c.usedAt ? new Date(c.usedAt).toLocaleString('ar-DZ') : '—'}</td>
            <td>
              <button class="copy-btn" onclick="copyCode('${c.code}', this)">نسخ</button>
            </td>
          </tr>
        `).join('');

        document.getElementById('tableWrap').innerHTML = `
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>الكود</th>
                <th>الخصم</th>
                <th>الحالة</th>
                <th>تاريخ الاستخدام</th>
                <th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      } catch (e) {
        document.getElementById('tableWrap').innerHTML =
          `<div class="error">خطأ في التحميل: ${e.message}</div>`;
      }
    }

    function copyCode(code, btn) {
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = '✓ تم النسخ';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'نسخ'; btn.classList.remove('copied'); }, 2000);
      });
    }

    load();
  </script>
</body>
</html>
